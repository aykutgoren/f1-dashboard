version: "3.9"

services:
  # PostgreSQL database service
  db:
    image: postgres:15
    restart: always
    env_file:
      - ./backend/.env   # Load DB credentials from env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"  # Expose DB port to host
    volumes:
      - pgdata:/var/lib/postgresql/data  # Persist DB data
    healthcheck:
      # Check if Postgres is ready before starting dependent services
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy  # Wait for DB to be healthy before starting
    env_file:
      - ./backend/.env   # Backend environment variables
    ports:
      - "8000:8000"  # API exposed on port 8000
    volumes:
      - ./backend/app:/app/app  # Mount source code for live reload during development
    restart: unless-stopped

  # Frontend React service for development mode
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev  # A Dockerfile that runs `npm run dev`
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_HOST=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

